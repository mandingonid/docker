<!DOCTYPE html>

<html>

  <head>
    <title>Rochambeau Score</title>
    <style>

    </style>
    
  </head>

  <body>
    <p>Rochembo with Score</p>

    <button onclick="
      moveCopy = pickComputerMove();
      result = computeResult('rock');
      alert(`You picked rock. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">Rock</button>


    <button onclick="
      moveCopy = pickComputerMove();
      result = computeResult('paper');
      alert(`You picked paper. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">Paper</button>


    <button onclick="  
      moveCopy = pickComputerMove();
      result = computeResult('scissors');
      alert(`You picked scissors. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">Scissors</button>

    <button onclick="
      console.log(scoreTotal);
      scoreTotal.wins = 0;
      scoreTotal.losses = 0;
      scoreTotal.ties = 0;
      console.log(scoreTotal);
    ">Reset Score</button>

    <button onclick="
      if(!savedScore){
        let stringScore = '';
        stringScore = JSON.stringify(scoreTotal);
        console.log(stringScore);
        console.log(scoreTotal);
        localStorage.setitem(keyName, stringScore);
        localStorage.setitem(keySaved, "true")
        savedScore = true;
      }      
    ">Quit</button>


    <script>
      let tempObj={};
      let result = '';
      let moveCopy = '';
      let xsavedScore = false;
      let scoreTotal = {
        wins: 0,
        losses: 0,
        ties: 0
      };

      const keyName = 'scoreKey';
      const keySaved = 'savedKey';

      // Recall/recover stored score from last game
      if("true" === localStorage.getItem(keySaved)){
        tempObj = localStorage.getItem(keyName);
        console.log(`Retrieved scores: ${tempObj}`);
        scoreTotal = JSON.parse(tempObj);
        console.log('previous score: ${scoreTotal}');
      }

      //
      //
      function computeResult(buttonSelect){
        if(buttonSelect === 'rock'){
          if(moveCopy === 'rock'){
            result = 'Tie.';
            scoreTotal.ties++;
          }
          else if(moveCopy === 'paper'){
            result = 'You loose.';
            scoreTotal.losses++;
          }
          else if(moveCopy === 'scissors'){
            result = 'You win.';
            scoreTotal.wins++;
          }
          return result;
        }

        if(buttonSelect === 'paper'){
          if(moveCopy === 'rock'){
            result = 'You win.';
            scoreTotal.wins++;
          }
          else if(moveCopy === 'paper'){
            result = 'Tie.';
            scoreTotal.ties++;
          }
          else if(moveCopy === 'scissors'){
            result = 'You loose.';
            scoreTotal.losses++;
          }
          return result;
        }
      
        if(buttonSelect === 'scissors'){
          if(moveCopy === 'rock'){
            result = 'You lose.';
            scoreTotal.losses++;
          }
          else if(moveCopy === 'paper'){
            result = 'You win.';
            scoreTotal.wins++;
          }
          else if(moveCopy === 'scissors'){
            result = 'Tie.';
            scoreTotal.ties++;
          }
          return result;
        }
      }
    
      //
      //
      function pickComputerMove(){
        let computerMove = '';
        const randomNumber = Math.random(); 
        console.log(randomNumber);
        if(randomNumber >= 0 && randomNumber < 1/3){
          computerMove = 'rock';
          console.log('rock');
        }
        else if (randomNumber >= 1/3 && randomNumber < 2/3) {
          computerMove = 'paper';
          console.log('paper');
        }
        else {
          computerMove = 'scissors';
          console.log('scissors');
        }
        return computerMove;
      }
    

    </script>

  </body>

</html>
