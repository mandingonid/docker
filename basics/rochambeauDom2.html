<!DOCTYPE html>

<html>

  <head>

      <title>Rochambeau</title>

      <link
        rel="stylesheet"
        href="../styles/rochambeauDom2.css"
      > 

  </head>


  <body>


    <p>Adding document object model to rochambeau </p>

    <p class="title">Rochambeau with Score</p>
    

    <button class="js-button-rock button-rock" onclick="
      buttonElementRock = document.querySelector('.js-button-rock');
      moveCopy = pickComputerMove();
      result = computeResult('rock');
      alert(`You picked rock. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">
      <img src="../emojis/rock-emoji.png" class="move-icon move-button">
    </button>


    <button class="js-button-paper button-paper" onclick="
      buttonElementPaper = document.querySelector('.js-button-paper');
      moveCopy = pickComputerMove();
      result = computeResult('paper');
      alert(`You picked paper. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">
      <img src='../emojis/paper-emoji.png' class="move-icon move-button">
    </button>


    <button class="js-button-scissors button-scissors" onclick="  
      buttonElementScissors = document.querySelector('.js-button-scissors');
      moveCopy = pickComputerMove();
      result = computeResult('scissors');
      alert(`You picked scissors. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">
      <img src="../emojis/scissors-emoji.png" class="move-icon move-button">
    </button>

    <p class="js-display-score display-score"></p>

    <p class="js-moves"></p>

    <p class="js-score"></p>

    <p class="bottom-make-space"></p>
    

    <button class="js-button-reset button-reset"  onclick="
      buttonElementReset = document.querySelector('.js-button-reset');
      console.log(scoreTotal);
      scoreTotal.wins = 0;
      scoreTotal.losses = 0;
      scoreTotal.ties = 0;
      localStorage.setItem(keySaved, 'false');
      console.log(scoreTotal);
    ">Reset Score</button>

    <button class="js-button-quit button-quit is-button-quit" onclick="
      buttonElementQuit  = document.querySelector('.js-button-quit');
      let stringScore = '';
      stringScore = JSON.stringify(scoreTotal);
      console.log(stringScore);
      console.log(scoreTotal);
      houseKeeping(stringScore);
      if(buttonElementQuit.innerText === 'Quit'){
        buttonElementQuit.innerHTML = 'Quit';
        buttonElementQuit.classList.add('is-button-quit');
      } else {
        buttonElementQuit.innerHTML = 'Quit';
        buttonElementQuit.classList.remove('is-button-quit'); 
      }
    ">Quit</button> 

  

    <script src="../scripts/rochembeauDom2.js"> </script>
  
  </body>


</html>
