<!DOCTYPE html>

<html>

  <head>

      <title>Document Object Model</title>
    

      <style>
        body{

        .button-reset{
          border: none;

  <body>


    <p>Adding document object model to rochambeau </p>

    <p>Rochambeau with Score</p>
    

    <button class="js-button-rock button-rock" onclick="
      buttonElementRock = document.querySelector('.js-button-rock');
      moveCopy = pickComputerMove();
      result = computeResult('rock');
      alert(`You picked rock. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">Rock</button>


    <button class="js-button-paper button-paper" onclick="
      buttonElementPaper = document.querySelector('.js-button-paper');
      moveCopy = pickComputerMove();
      result = computeResult('paper');
      alert(`You picked paper. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">Paper</button>


    <button class="js-button-scissors button-scissors" onclick="  
      buttonElementScissors = document.querySelector('.js-button-scissors');
      moveCopy = pickComputerMove();
      result = computeResult('scissors');
      alert(`You picked scissors. Computer picked ${moveCopy} ${result}
Your progress: Wins ${scoreTotal.wins} Losses ${scoreTotal.losses} Ties ${scoreTotal.ties}`);
    ">Scissors</button>

    <button class="js-button-reset button-reset"  onclick="
      buttonElementReset = document.querySelector('.js-button-reset');
      console.log(scoreTotal);
      scoreTotal.wins = 0;
      scoreTotal.losses = 0;
      scoreTotal.ties = 0;
      localStorage.setItem(keySaved, 'false');
      console.log(scoreTotal);
    ">Reset Score</button>

    <button class="js-button-quit button-quit is-button-quit" onclick="
      buttonElementQuit  = document.querySelector('.js-button-quit');
      let stringScore = '';
      stringScore = JSON.stringify(scoreTotal);
      console.log(stringScore);
      console.log(scoreTotal);
      houseKeeping(stringScore);
      if(buttonElementQuit.innerText === 'Quit'){
        buttonElementQuit.innerHTML = 'Quit';
        buttonElementQuit.classList.add('is-button-quit');
      } else {
        buttonElementQuit.innerHTML = 'Quit';
        buttonElementQuit.classList.remove('is-button-quit');
      }
    ">Quit</button>

    <script>

      /*
      let htmlElement = document.querySelector('.button-reset ');
      console.log(htmlElement);

    
      document.body.innerHTML = 'Hello';
      document.title = "Good Job";
      (document.querySelector('.js-button-rock')).innerHTML;  
      
      document.title = 'Rochambeau w/ DOM';

      // Import HTML body into javascript document
      document.body;
      
      // Gain control of all HTML within the javascript body
      document.body.innerHTML;


    */
   
    let tempObj={};
      let result = '';
      let moveCopy = '';
      let scoreTotal = {
        wins: 0,
        losses: 0,
        ties: 0
      };

      const keyScore = 'scoreKey';
      const keySaved = 'savedKey';

      // Recall/recover stored score from last game
      let needToRecall = localStorage.getItem(keySaved);
      console.log(needToRecall);
      if("true" === needToRecall){
        tempObj = localStorage.getItem(keyScore);
        console.log(`Retrieved scores: ${tempObj}`);
        scoreTotal = JSON.parse(tempObj);
        console.log(`previous score: ${scoreTotal}`);
      }
      else
        houseKeeping(JSON.stringify(scoreTotal));

      function houseKeeping(scoreString){
        console.log(`Setting up persistent write: ${keyScore} ${scoreString}`);
        localStorage.setItem(keySaved, 'true');
        localStorage.setItem(keyScore, scoreString); 
      }

      //
      //
      function computeResult(buttonSelect){
        if(buttonSelect === 'rock'){
          if(moveCopy === 'rock'){
            result = 'Tie.';
            scoreTotal.ties++;
          }
          else if(moveCopy === 'paper'){
            result = 'You loose.';
            scoreTotal.losses++;
          }
          else if(moveCopy === 'scissors'){
            result = 'You win.';
            scoreTotal.wins++;
          }
          return result;
        }

        if(buttonSelect === 'paper'){
          if(moveCopy === 'rock'){
            result = 'You win.';
            scoreTotal.wins++;
          }
          else if(moveCopy === 'paper'){
            result = 'Tie.';
            scoreTotal.ties++;
          }
          else if(moveCopy === 'scissors'){
            result = 'You loose.';
            scoreTotal.losses++;
          }
          return result;
        }
      
        if(buttonSelect === 'scissors'){
          if(moveCopy === 'rock'){
            result = 'You lose.';
            scoreTotal.losses++;
          }
          else if(moveCopy === 'paper'){
            result = 'You win.';
            scoreTotal.wins++;
          }
          else if(moveCopy === 'scissors'){
            result = 'Tie.';
            scoreTotal.ties++;
          }
          return result;
        }
      }
    
      //
      //
      function pickComputerMove(){
        let computerMove = '';
        const randomNumber = Math.random(); 
        console.log(randomNumber);
        if(randomNumber >= 0 && randomNumber < 1/3){
          computerMove = 'rock';
          console.log('rock');
        }
        else if (randomNumber >= 1/3 && randomNumber < 2/3) {
          computerMove = 'paper';
          console.log('paper');
        }
        else {
          computerMove = 'scissors';
          console.log('scissors');
        }
        return computerMove;
      }


    </script>
  
  </body>


</html>
