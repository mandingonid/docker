<!DOCTYPE html>

<html>


  <head>

    <title>DOM Projects</title>

    <p>YouTube Subscribe Button</p>


    
    <button class="js-subscribe-button" onclick="
      subscribe();
   ">Subscribe</button>


    <p>Amazon Shipping Calculator</p>

    <p>Orders under $40= +$10 shipping</p>

    <p>Orders $40 and over= Free shipping</p>

    <input placeholder="Cost of order">
    <button class="js-cost-input" onclick="
      calculateTotal();
    ">Calculate</button>

   <p class="js-total-cost"></p>
   
   <style>


    </style>

  </head>


  <body>


    <script>

      function calculateTotal(){
        let shipping = 0;
        const inputElement = document.querySelector('.js-cost-input');
        let item = Number(inputElement.value);
        console.log(typeof item);
        if(item >= 40){
          shipping = 0;
        }else{
          shipping = 10;
        }
        let total = item + shipping;
        console.log(`item: ${item} shipping: ${shipping}  Total: ${total}`);
 
        document.querySelector('.js-total-cost').innerHTML=`$${total}`;
        return total;
      };


      function subscribe(){
        const buttonElement = document.querySelector('.js-subscribe-button')

        if(buttonElement.innerText === 'Subscribe'){
          buttonElement.innerHTML = 'Subscribed';
        }else{
          buttonElement.innerHTML = 'Subscribe';
        }

      };
    </script>

  </body>

</html>
